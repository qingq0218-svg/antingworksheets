<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>安婷 工作進度 Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--g:#1d9e75;--g2:#0f6e56;--bg:#f5f6f8;--card:#fff;--border:#e4e6ea;--t1:#1a1d23;--t2:#5f6470;--t3:#9da4ae;--r:12px;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;}
a{color:inherit;text-decoration:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.hdr{background:var(--card);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:60;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--g);}
.htitle{font-size:14px;font-weight:700;}
.hsub{font-size:11px;color:var(--t3);margin-left:4px;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.hupdate{font-size:11px;color:var(--t3);}
.btn-ref{font-size:11px;padding:4px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;}
.btn-ref:hover{border-color:var(--g);color:var(--g);}
.spin{display:inline-block;animation:spin .8s linear infinite;}
.tab-nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;overflow-x:auto;}
.tab-btn{font-size:12px;font-weight:500;padding:11px 16px;border:none;background:transparent;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;white-space:nowrap;}
.tab-btn:hover{color:var(--t1);}
.tab-btn.on{color:var(--g2);border-bottom-color:var(--g);}
.wrap{max-width:1100px;margin:0 auto;padding:1.25rem 1.5rem;}
.tab-sec{display:none;}.tab-sec.on{display:block;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.1rem;}
.mc{background:var(--card);border-radius:var(--r);padding:.85rem 1rem;box-shadow:var(--sh);border:1px solid var(--border);position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:var(--mc,var(--g));border-radius:4px 0 0 4px;}
.mc-l{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:4px;}
.mc-v{font-size:24px;font-weight:700;color:var(--mc,var(--t1));}
.mc-s{font-size:11px;color:var(--t3);margin-top:2px;}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.1rem;}
.cc{background:var(--card);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:var(--sh);border:1px solid var(--border);}
.cc-t{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:8px;}
.legend{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:7px;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2);}
.legdot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap;}
.sec-t{font-size:12px;font-weight:600;color:var(--t1);margin-right:4px;}
.fb{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;font-family:inherit;}
.fb:hover{border-color:var(--g);color:var(--g);}
.fb.on{background:var(--g);color:#fff;border-color:transparent;}
.msel,.srch{font-size:11px;padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t1);font-family:inherit;}
.srch{width:150px;margin-left:auto;}
.srch:focus{outline:none;border-color:var(--g);}
.cards{display:flex;flex-direction:column;gap:6px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:#b8ddd1;box-shadow:0 2px 10px rgba(29,158,117,.07);}
.card-hd{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;user-select:none;}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap;}
.sa{background:#fef9c3;color:#92700a;}.sd{background:#dbeafe;color:#1d4ed8;}.sp{background:#e5e7eb;color:#374151;}
.btag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg);border:1px solid var(--border);white-space:nowrap;font-weight:600;}
.mtag{font-size:10px;padding:2px 6px;border-radius:4px;background:#f0fdf4;color:#166634;border:1px solid #bbf7d0;white-space:nowrap;font-weight:600;}
.cname{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.clatest{font-size:11px;color:var(--t3);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prow{display:flex;align-items:center;gap:7px;min-width:110px;}
.pbar-bg{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.pbar-fg{height:100%;border-radius:3px;transition:width .4s;}
.ptxt{font-size:10px;color:var(--t3);white-space:nowrap;min-width:28px;text-align:right;}
.chev{font-size:13px;color:var(--t3);transition:transform .2s;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}
.card-bd{display:none;border-top:1px solid var(--border);padding:13px 15px;}
.card-bd.open{display:block;}
.bd-pbar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:4px;}
.bd-pfg{height:100%;border-radius:4px;}
.bd-plabel{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:11px;}
.bd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;}
.blbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.steps{display:flex;flex-direction:column;gap:5px;}
.step{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--t2);padding:2px 0;}
.sdot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;margin-top:.5px;}
.sdot.curr{background:#fff;border-color:var(--g);color:var(--g);}
.slbl{line-height:1.4;}.slbl.curr{color:var(--g2);font-weight:500;}
.log-list{display:flex;flex-direction:column;gap:3px;}
.log-item{display:flex;gap:7px;font-size:12px;padding:2px 0;}
.logdot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0;margin-top:5px;}
.logtxt{color:var(--t2);line-height:1.5;}
.empty-note{font-size:12px;color:var(--t3);font-style:italic;}
.gantt-wrap{overflow-x:auto;}
.gantt-table{border-collapse:collapse;min-width:100%;}
.gantt-table th{font-size:10px;font-weight:600;color:var(--t3);padding:5px 8px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;}
.gantt-table th.task-col{text-align:left;min-width:160px;}
.gantt-table th.month-col{min-width:52px;}
.gantt-table td{padding:3px 4px;vertical-align:middle;border-bottom:1px solid var(--border);}
.gantt-bar-cell{text-align:center;padding:4px 2px;}
.gantt-bar{height:15px;border-radius:3px;display:inline-block;width:88%;vertical-align:middle;}
.gantt-bar.empty{background:transparent;}
.month-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.mtab{font-size:11px;padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s;}
.mtab:hover{border-color:var(--g);color:var(--g);}
.mtab.on{background:var(--g);color:#fff;border-color:transparent;}
.month-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.1rem;}
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:1.5rem;}
.link-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:var(--sh);display:flex;flex-direction:column;gap:8px;transition:border-color .15s,box-shadow .15s;}
.link-card:hover{border-color:#b8ddd1;box-shadow:0 2px 12px rgba(29,158,117,.08);}
.link-card-top{display:flex;align-items:flex-start;gap:10px;}
.link-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.link-info{flex:1;min-width:0;}
.link-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.link-desc{font-size:11px;color:var(--t3);line-height:1.4;}
.link-url-box{font-size:10px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--bg);padding:4px 8px;border-radius:6px;}
.link-actions{display:flex;gap:6px;align-items:center;}
.btn-link{font-size:11px;padding:5px 12px;border-radius:8px;border:1px solid var(--g);background:var(--g);color:#fff;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;}
.btn-link:hover{background:var(--g2);}
.btn-le{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;font-family:inherit;}
.btn-le:hover{border-color:var(--g);color:var(--g);}
.btn-ld{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid #fca5a5;background:var(--card);color:#dc2626;cursor:pointer;font-family:inherit;}
.btn-ld:hover{background:#fee2e2;}
.link-form{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:1.5rem;box-shadow:var(--sh);}
.lf-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.lf-field{display:flex;flex-direction:column;gap:4px;}
.lf-field label{font-size:11px;color:var(--t3);}
.lf-field input,.lf-field select{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--t1);font-family:inherit;width:100%;}
.lf-full{grid-column:1/-1;}
.divider{font-size:11px;font-weight:600;color:var(--t3);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
.msg{font-size:11px;color:var(--g);}
.btn-add{font-size:12px;padding:6px 16px;border-radius:8px;border:none;background:var(--g);color:#fff;cursor:pointer;font-family:inherit;}
.btn-cancel{font-size:11px;padding:5px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;}
.loading-view{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:4rem;color:var(--t3);font-size:13px;}
.loading-spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;}
.error-box{background:#fff5f5;border:1px solid #fecaca;border-radius:var(--r);padding:1.5rem;text-align:center;color:#dc2626;font-size:13px;margin:2rem 0;line-height:1.9;}
.notice{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:var(--r);padding:.75rem 1rem;font-size:11px;color:var(--g2);margin-bottom:1rem;display:flex;align-items:center;gap:6px;}
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr);}.charts{grid-template-columns:1fr;}.bd-grid{grid-template-columns:1fr;}.lf-grid{grid-template-columns:1fr;}.wrap{padding:1rem;}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l"><div class="dot"></div><span class="htitle">工作進度 Dashboard</span><span class="hsub">安婷 行銷部 2026</span></div>
  <div class="hdr-r">
    <span class="hupdate" id="hupdate">讀取中…</span>
    <button class="btn-ref" onclick="loadSheet()" id="refBtn">
      <span class="spin" id="refIcon" style="display:none">↻</span>
      <span id="refTxt">↻ 重新整理</span>
    </button>
  </div>
</header>

<nav class="tab-nav">
  <button class="tab-btn on"  onclick="switchTab('overview',this)">📊 總覽</button>
  <button class="tab-btn"     onclick="switchTab('tasks',this)">📋 案件清單</button>
  <button class="tab-btn"     onclick="switchTab('gantt',this)">📅 時間軸</button>
  <button class="tab-btn"     onclick="switchTab('monthly',this)">🗓 月份報表</button>
  <button class="tab-btn"     onclick="switchTab('links',this)">🔗 資料連結</button>
</nav>

<div class="wrap">
  <div id="loadingView" class="loading-view">
    <div class="loading-spinner"></div>
    <div>從 Google Sheets 讀取資料中…</div>
  </div>
  <div id="errorView" class="error-box" style="display:none"></div>
  <div id="main" style="display:none">

    <!-- 總覽 -->
    <div id="tab-overview" class="tab-sec on">
      <div class="notice">✅ 資料即時同步自 Google Sheets — 每次開啟或按「重新整理」自動抓取最新資料</div>
      <div class="metrics" id="mRow"></div>
      <div class="charts">
        <div class="cc"><div class="cc-t">各品牌案件數</div><div style="position:relative;height:200px"><canvas id="cBrand"></canvas></div></div>
        <div class="cc"><div class="cc-t">狀態分布</div><div class="legend" id="donutLeg"></div><div style="position:relative;height:165px"><canvas id="cDonut"></canvas></div></div>
        <div class="cc"><div class="cc-t">各月份工作量趨勢</div><div style="position:relative;height:165px"><canvas id="cLine"></canvas></div></div>
        <div class="cc"><div class="cc-t">進行中 vs 已完成</div><div style="position:relative;height:165px"><canvas id="cStack"></canvas></div></div>
      </div>
    </div>

    <!-- 案件清單 -->
    <div id="tab-tasks" class="tab-sec">
      <div class="toolbar">
        <span class="sec-t">案件清單</span>
        <button class="fb on" data-f="all">全部</button>
        <button class="fb" data-f="進行中">進行中</button>
        <button class="fb" data-f="已完成">已完成</button>
        <button class="fb" data-f="暫停中">暫停</button>
        <select class="msel" id="mSel"></select>
        <input class="srch" id="srch" type="text" placeholder="搜尋品牌或案件…">
      </div>
      <div class="cards" id="cardList"></div>
    </div>

    <!-- 甘特圖 -->
    <div id="tab-gantt" class="tab-sec">
      <div class="cc">
        <div class="cc-t">任務時間軸（甘特圖）<span style="font-size:10px;font-weight:400;color:var(--t3);margin-left:8px;">每格 = 一個月</span></div>
        <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;">
          <span class="leg"><span class="legdot" style="background:#EAB308"></span>進行中</span>
          <span class="leg"><span class="legdot" style="background:#3B82F6"></span>已完成</span>
          <span class="leg"><span class="legdot" style="background:#6B7280"></span>暫停</span>
        </div>
        <div class="gantt-wrap" id="ganttWrap"></div>
      </div>
    </div>

    <!-- 月份報表 -->
    <div id="tab-monthly" class="tab-sec">
      <div class="month-tabs" id="monthTabs"></div>
      <div id="monthContent"></div>
    </div>

    <!-- 資料連結 -->
    <div id="tab-links" class="tab-sec">
      <div class="link-form" id="linkForm">
        <div style="font-size:12px;font-weight:600;margin-bottom:4px;" id="lfTitle">＋ 新增資料連結</div>
        <div class="lf-grid">
          <div class="lf-field"><label>標題</label><input id="lf-title" placeholder="例：易利氣社群月報"></div>
          <div class="lf-field"><label>類別</label><select id="lf-cat"><option value="社群">📱 社群</option><option value="藥廣">📋 藥廣展延</option><option value="市調">📊 市調</option><option value="KOC">🤝 KOC</option><option value="活動">🎉 活動</option><option value="其他">📁 其他</option></select></div>
          <div class="lf-field"><label>品牌（選填）</label><select id="lf-brand"><option value="">— 不指定 —</option><option>易利氣</option><option>Wakamoto</option><option>改源</option><option>改源IB</option><option>MUHI</option><option>SLIMWALK</option><option>全品牌</option></select></div>
          <div class="lf-field"><label>備註說明（選填）</label><input id="lf-desc" placeholder="例：1-5月社群貼文排程"></div>
          <div class="lf-field lf-full"><label>連結網址</label><input id="lf-url" placeholder="https://..."></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn-add" onclick="saveLink()">儲存連結</button>
          <button class="btn-cancel" onclick="cancelLinkEdit()">取消</button>
          <span class="msg" id="lf-msg"></span>
        </div>
      </div>
      <div id="linksContent"></div>
    </div>

  </div><!-- /main -->
</div><!-- /wrap -->

<script>
// ══════════════════════════════════════════════
// CONFIG — 只需改這裡就能換試算表
// ══════════════════════════════════════════════
const SHEET_ID = '1EQtHcy_OfYTRfK3UV7jv9KusUTXs_LK89SZ4hWT6XW0';
// gviz/tq 是 Google 支援的 JSON 端點，允許跨來源請求，GitHub Pages 可正常使用
const GVIZ = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&gid=0';
const LINKS_KEY = 'anting_links_v4';

const ML = {1:'1月',2:'2月',3:'3月',4:'4月',5:'5月',6:'6月',7:'7月',8:'8月',9:'9月',10:'10月',11:'11月',12:'12月'};
const M2N = {'1月':1,'2月':2,'3月':3,'4月':4,'5月':5,'6月':6,'7月':7,'8月':8,'9月':9,'10月':10,'11月':11,'12月':12};
const PC = {'進行中':'#EAB308','已完成':'#3B82F6','暫停中':'#6B7280','暫停':'#6B7280','暫緩':'#6B7280'};
const SC = {'進行中':'sa','已完成':'sd','暫停中':'sp','暫停':'sp','暫緩':'sp'};
const BCOL = {'易利氣':'#22C55E','Wakamoto':'#F97316','改源':'#F472B6','改源IB':'#EC4899','SLIMWALK':'#8B5CF6','MUHI':'#3B82F6','例行':'#64748B'};
const CSTYLE = {'社群':{icon:'📱',bg:'#f0f9ff'},'藥廣':{icon:'📋',bg:'#fefce8'},'市調':{icon:'📊',bg:'#f0fdf4'},'KOC':{icon:'🤝',bg:'#fdf4ff'},'活動':{icon:'🎉',bg:'#fff7ed'},'其他':{icon:'📁',bg:'#f8fafc'}};
const bc = n => BCOL[n] || '#8B5CF6';

let TASKS=[], LINKS=[], filt='all', mon='all', srch='', curMonthTab=5, activeTab='overview';
let cBrand, cDonut, cLine, cStack, editingLinkId=null;

// ── 資料連結存在 localStorage（每台電腦獨立）
function saveLinks(){try{localStorage.setItem(LINKS_KEY,JSON.stringify(LINKS));}catch(e){}}
function loadLinks(){
  try{const d=JSON.parse(localStorage.getItem(LINKS_KEY));if(d&&d.length>0){LINKS=d;return;}}catch(e){}
  LINKS=[
    {id:'l1',title:'藥廣展延總表',cat:'藥廣',brand:'易利氣',desc:'各月份藥廣展延進度與繳費記錄',url:'https://docs.google.com/spreadsheets/d/1DBz2WvYEZMwUT9v74B3YcD3oG-Wpuv2Ft7ZHrtxM_ms/edit?gid=0#gid=0'},
    {id:'l2',title:'社群貼文排程',cat:'社群',brand:'全品牌',desc:'1-5月各品牌社群貼文規劃與排程',url:'https://docs.google.com/spreadsheets/d/1XA-HrNDyhCJ0T6HGGYzv6Vf7pbMl81xAyCRaP753dxU/edit?gid=238053532#gid=238053532'},
    {id:'l3',title:'工作日報案件總表',cat:'其他',brand:'全品牌',desc:'Dashboard 資料來源',url:'https://docs.google.com/spreadsheets/d/1EQtHcy_OfYTRfK3UV7jv9KusUTXs_LK89SZ4hWT6XW0/edit?usp=sharing'},
  ];
}

// ══════════════════════════════════════════════
// 讀取 Google Sheets（gviz JSON，不受 CORS 限制）
// ══════════════════════════════════════════════
async function loadSheet(){
  setRefLoading(true);
  try{
    const res = await fetch(GVIZ);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    // gviz 回傳：google.visualization.Query.setResponse({...});
    // 去掉前後包裝，取出純 JSON
    const clean = text.replace(/^[^\(]+\(/, '').replace(/\);\s*$/, '');
    const json = JSON.parse(clean);
    TASKS = parseGviz(json);
    document.getElementById('hupdate').textContent =
      '更新：' + new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('errorView').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    render();
  }catch(e){
    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('main').style.display = 'none';
    const eb = document.getElementById('errorView');
    eb.style.display = 'block';
    eb.innerHTML =
      '⚠️ 無法讀取 Google Sheets<br><br>' +
      '請到試算表右上角「共用」→「知道連結的人」→ 選「檢視者」→ 完成後按下方按鈕重試。<br>' +
      '<small style="color:#991b1b">' + e.message + '</small><br><br>' +
      '<button onclick="loadSheet()" style="padding:6px 16px;border-radius:8px;border:1px solid #dc2626;background:transparent;color:#dc2626;cursor:pointer;font-family:inherit">重新嘗試</button>';
  }
  setRefLoading(false);
}

function setRefLoading(on){
  document.getElementById('refIcon').style.display = on ? 'inline-block' : 'none';
  document.getElementById('refTxt').textContent = on ? '讀取中…' : '↻ 重新整理';
  document.getElementById('refBtn').disabled = on;
}

// ── 解析 gviz JSON 結構
function parseGviz(json){
  const tasks = [];
  const valid = ['進行中','已完成','暫停中','暫停','暫緩'];
  const rows = (json.table && json.table.rows) ? json.table.rows : [];
  for(let i = 1; i < rows.length; i++){      // i=0 是標題行，從 i=1 開始
    const row = rows[i];
    if(!row || !row.c) continue;
    const get = idx => {
      const cell = row.c[idx];
      return (cell && cell.v != null) ? String(cell.v).trim() : '';
    };
    const brand  = get(0);
    const name   = get(1);
    const status = get(2);
    if(!brand || !name || !valid.includes(status)) continue;
    const startM = M2N[get(3)] || null;
    if(!startM) continue;
    const endM   = M2N[get(4)] || null;
    const pctRaw = get(5);
    const steps  = get(6).split('|').map(s=>s.trim()).filter(Boolean);
    const log    = get(7).split('|').map(s=>s.trim()).filter(Boolean);
    const completedSteps = status==='已完成' ? steps.length : 0;
    let pct;
    if(pctRaw !== '')        pct = Math.min(100, parseInt(pctRaw)||0);
    else if(steps.length>0)  pct = Math.round(completedSteps/steps.length*100);
    else                     pct = status==='已完成' ? 100 : 0;
    tasks.push({brand, name, status, startM, endM: endM||null, steps, completedSteps, pct, log, latest: log[0]||''});
  }
  return tasks;
}

// ── 篩選
function taskInMonth(t,m){
  if(m==='all') return true;
  const mi = parseInt(m);
  if(t.endM!==null) return t.startM<=mi && t.endM>=mi;
  return t.startM===mi;
}
function filtered(){
  return TASKS.filter(t=>{
    const mOk = taskInMonth(t,mon);
    const sOk = filt==='all'
      || (filt==='暫停中' && ['暫停','暫停中','暫緩'].includes(t.status))
      || t.status===filt;
    const qOk = !srch || (t.brand+t.name).toLowerCase().includes(srch.toLowerCase());
    return mOk&&sOk&&qOk;
  });
}

function render(){
  buildMonthSel();
  const list = filtered();
  renderMetrics(list);
  renderCharts();
  renderCardList('cardList', list);
  if(activeTab==='gantt')   renderGantt();
  if(activeTab==='monthly') renderMonthly();
  if(activeTab==='links')   renderLinks();
}

function buildMonthSel(){
  const ms=new Set(); TASKS.forEach(t=>ms.add(t.startM));
  const s=[...ms].sort((a,b)=>a-b);
  document.getElementById('mSel').innerHTML =
    '<option value="all">全部月份</option>' + s.map(m=>`<option value="${m}">${ML[m]}</option>`).join('');
  if(s.length) curMonthTab = s[s.length-1];
}

// ── 總覽數字
function renderMetrics(list){
  const n=list.length, a=list.filter(t=>t.status==='進行中').length, d=list.filter(t=>t.status==='已完成').length;
  document.getElementById('mRow').innerHTML =
    `<div class="mc" style="--mc:#1a1d23"><div class="mc-l">總案件</div><div class="mc-v">${n}</div><div class="mc-s">目前篩選</div></div>`+
    `<div class="mc" style="--mc:#0f6e56"><div class="mc-l">進行中</div><div class="mc-v">${a}</div><div class="mc-s">${n?Math.round(a/n*100):0}%</div></div>`+
    `<div class="mc" style="--mc:#3b6d11"><div class="mc-l">已完成</div><div class="mc-v">${d}</div><div class="mc-s">${n?Math.round(d/n*100):0}%</div></div>`+
    `<div class="mc" style="--mc:#854f0b"><div class="mc-l">負責品牌</div><div class="mc-v">${new Set(TASKS.map(t=>t.brand)).size}</div><div class="mc-s">個品牌</div></div>`;
}

// ── 圖表
function renderCharts(){
  const bc2={}; TASKS.forEach(t=>{bc2[t.brand]=(bc2[t.brand]||0)+1;});
  const sorted=Object.entries(bc2).sort((a,b)=>b[1]-a[1]);
  if(cBrand) cBrand.destroy();
  cBrand=new Chart(document.getElementById('cBrand'),{type:'bar',data:{labels:sorted.map(x=>x[0]),datasets:[{data:sorted.map(x=>x[1]),backgroundColor:sorted.map(x=>bc(x[0])),borderRadius:4,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw+' 件'}}},scales:{x:{ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},y:{ticks:{font:{size:10}}}}}});

  const sc={}; TASKS.forEach(t=>{const k=['暫停','暫停中','暫緩'].includes(t.status)?'暫停中':t.status; sc[k]=(sc[k]||0)+1;});
  const se=Object.entries(sc); const scols=se.map(([k])=>PC[k]||'#888');
  if(cDonut) cDonut.destroy();
  cDonut=new Chart(document.getElementById('cDonut'),{type:'doughnut',data:{labels:se.map(x=>x[0]),datasets:[{data:se.map(x=>x[1]),backgroundColor:scols,borderWidth:2,borderColor:'#fff',hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} 件`}}}}});
  document.getElementById('donutLeg').innerHTML=se.map(([k,v],i)=>`<div class="leg"><div class="legdot" style="background:${scols[i]}"></div>${k} <strong>${v}</strong></div>`).join('');

  const months=[1,2,3,4,5]; const ml=months.map(m=>ML[m]);
  const bm=months.map(m=>{
    const mT=TASKS.filter(t=>t.startM===m);
    const u=new Map(); mT.forEach(t=>u.set(t.brand+'|'+t.name,t));
    const all=[...u.values()];
    return{total:all.length,active:all.filter(t=>t.status==='進行中').length,done:all.filter(t=>t.status==='已完成').length};
  });
  if(cLine) cLine.destroy();
  cLine=new Chart(document.getElementById('cLine'),{type:'line',data:{labels:ml,datasets:[{label:'案件數',data:bm.map(m=>m.total),borderColor:'#EAB308',backgroundColor:'rgba(234,179,8,.08)',tension:.35,pointRadius:4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},x:{ticks:{font:{size:10}}}}}});
  if(cStack) cStack.destroy();
  cStack=new Chart(document.getElementById('cStack'),{type:'bar',data:{labels:ml,datasets:[{label:'進行中',data:bm.map(m=>m.active),backgroundColor:'#EAB308',borderRadius:3,stack:'s'},{label:'已完成',data:bm.map(m=>m.done),backgroundColor:'#3B82F6',borderRadius:3,stack:'s'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},scales:{x:{stacked:true,ticks:{font:{size:10}}},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}}}}});
}

// ── 卡片
function cardHTML(t,uid){
  const col=PC[t.status]||'#888';
  const isM=t.endM&&t.endM===t.startM;
  const mTag=isM?`<span class="mtag">${ML[t.startM]}</span>`:'';
  const stepsHtml=t.steps.length
    ?t.steps.map((s,si)=>{const curr=si===0&&t.status==='進行中';return `<div class="step"><div class="sdot ${curr?'curr':''}">${curr?'▶':''}</div><span class="slbl ${curr?'curr':''}">${s}</span></div>`;}).join('')
    :'<div class="empty-note">無步驟記錄</div>';
  const logHtml=t.log.length
    ?`<div class="log-list">`+t.log.slice(0,8).map(l=>`<div class="log-item"><div class="logdot"></div><div class="logtxt">${l}</div></div>`).join('')+'</div>'
    :'<div class="empty-note">尚無記錄</div>';
  const span=t.endM&&t.endM!==t.startM?`${ML[t.startM]}～${ML[t.endM]}`:ML[t.startM]||'';
  return `<div class="card">
    <div class="card-hd" onclick="toggleCard('bd-${uid}','ch-${uid}')">
      <span class="pill ${SC[t.status]||'sp'}">${t.status}</span>
      <span class="btag" style="border-color:${bc(t.brand)}44;color:${bc(t.brand)}">${t.brand}</span>
      ${mTag}
      <span class="cname">${t.name}</span>
      <span class="clatest">${t.latest||'—'}</span>
      <div class="prow"><div class="pbar-bg"><div class="pbar-fg" style="width:${t.pct}%;background:${col}"></div></div><span class="ptxt">${t.pct}%</span></div>
      <span class="chev" id="ch-${uid}">▾</span>
    </div>
    <div class="card-bd" id="bd-${uid}">
      <div class="bd-pbar"><div class="bd-pfg" style="width:${t.pct}%;background:${col}"></div></div>
      <div class="bd-plabel"><span>${span}${t.steps.length?' · '+t.steps.length+' 個步驟':''}</span><span>${t.pct}% 完成</span></div>
      <div class="bd-grid">
        <div><div class="blbl">待辦步驟</div><div class="steps">${stepsHtml}</div></div>
        <div><div class="blbl">進度記錄</div>${logHtml}</div>
      </div>
    </div>
  </div>`;
}

function renderCardList(elId,list){
  const el=document.getElementById(elId);
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--t3);font-size:13px;">無符合條件的案件</div>';return;}
  el.innerHTML=list.map((t,i)=>cardHTML(t,elId+i)).join('');
}
function toggleCard(bdId,chId){document.getElementById(bdId).classList.toggle('open');document.getElementById(chId).classList.toggle('open');}

// ── 甘特圖
function renderGantt(){
  const months=[1,2,3,4,5,6];
  const ganttTasks=TASKS.filter(t=>t.endM===null||t.endM!==t.startM);
  const seen=new Set(); const recurring=[];
  TASKS.filter(t=>t.startM===t.endM).forEach(t=>{const k=t.brand+'|'+t.name;if(!seen.has(k)){seen.add(k);recurring.push({...t,startM:1,endM:5});}});
  const all=[...recurring,...ganttTasks];
  let html=`<table class="gantt-table"><thead><tr><th class="task-col">品牌 / 案件</th>${months.map(m=>`<th class="month-col">${ML[m]}</th>`).join('')}</tr></thead><tbody>`;
  all.forEach(t=>{const col=PC[t.status]||'#888';html+=`<tr><td><div style="font-size:12px;font-weight:500">${t.name}</div><div style="font-size:10px;color:var(--t3)">${t.brand}</div></td>${months.map(m=>{const inR=t.startM<=m&&(t.endM==null||t.endM>=m);return `<td class="gantt-bar-cell">${inR?`<div class="gantt-bar" style="background:${col};opacity:.8"></div>`:'<div class="gantt-bar empty"></div>'}</td>`;}).join('')}</tr>`;});
  document.getElementById('ganttWrap').innerHTML=html+'</tbody></table>';
}

// ── 月份報表
function renderMonthly(){
  const months=[1,2,3,4,5];
  document.getElementById('monthTabs').innerHTML=months.map(m=>`<button class="mtab ${m===curMonthTab?'on':''}" onclick="selectMonth(${m})">${ML[m]}</button>`).join('');
  const mt=TASKS.filter(t=>{
    if(t.endM===null)    return t.startM<=curMonthTab;
    if(t.startM===t.endM) return t.startM===curMonthTab;
    return t.startM<=curMonthTab&&t.endM>=curMonthTab;
  });
  const u=new Map(); mt.forEach(t=>u.set(t.brand+'|'+t.name+'|'+t.startM,t));
  const list=[...u.values()];
  const active=list.filter(t=>t.status==='進行中').length;
  const done=list.filter(t=>t.status==='已完成').length;
  const paused=list.filter(t=>['暫停','暫停中','暫緩'].includes(t.status)).length;
  const ch=list.length?list.map((t,i)=>cardHTML(t,'m'+curMonthTab+'_'+i)).join(''):'<div style="text-align:center;padding:1.5rem;color:var(--t3);font-size:13px;">本月無案件</div>';
  document.getElementById('monthContent').innerHTML=
    `<div class="month-stats">
      <div class="mc" style="--mc:#0f6e56"><div class="mc-l">${ML[curMonthTab]}執行中案件</div><div class="mc-v">${list.length}</div><div class="mc-s">含跨月</div></div>
      <div class="mc" style="--mc:#1d9e75"><div class="mc-l">本月新開案</div><div class="mc-v">${TASKS.filter(t=>t.startM===curMonthTab).length}</div><div class="mc-s">件</div></div>
      <div class="mc" style="--mc:#854f0b"><div class="mc-l">進行中 / 完成</div><div class="mc-v">${active} / ${done}</div><div class="mc-s">暫停 ${paused} 件</div></div>
    </div>
    <div class="cc"><div class="cc-t">${ML[curMonthTab]} — 執行中案件（含跨月）</div><div class="cards" style="margin-top:8px">${ch}</div></div>`;
}
function selectMonth(m){curMonthTab=m;renderMonthly();}

// ── 資料連結
function renderLinks(){
  const el=document.getElementById('linksContent');
  if(!LINKS.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--t3);font-size:13px;">尚無連結，請在上方新增</div>';return;}
  const groups={}; LINKS.forEach(l=>{if(!groups[l.cat])groups[l.cat]=[];groups[l.cat].push(l);});
  let html='';
  ['社群','藥廣','市調','KOC','活動','其他'].forEach(cat=>{
    if(!groups[cat])return;
    const st=CSTYLE[cat]||{icon:'📁',bg:'#f8fafc'};
    html+=`<div class="divider">${st.icon} ${cat}</div><div class="links-grid">`;
    groups[cat].forEach(l=>{
      const short=l.url.replace(/^https?:\/\//,'').substring(0,48)+'…';
      html+=`<div class="link-card">
        <div class="link-card-top">
          <div class="link-icon" style="background:${st.bg}">${st.icon}</div>
          <div class="link-info"><div class="link-title">${l.title}</div><div class="link-desc">${l.brand?`<span style="color:${bc(l.brand)};font-weight:600">${l.brand}</span> · `:''} ${l.desc||''}</div></div>
        </div>
        <div class="link-url-box" title="${l.url}">${short}</div>
        <div class="link-actions">
          <a class="btn-link" href="${l.url}" target="_blank" rel="noopener">開啟 ↗</a>
          <button class="btn-le" onclick="editLink('${l.id}')">編輯</button>
          <button class="btn-ld" onclick="deleteLink('${l.id}')">刪除</button>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}
function saveLink(){
  const title=document.getElementById('lf-title').value.trim();
  const url=document.getElementById('lf-url').value.trim();
  if(!title||!url){document.getElementById('lf-msg').textContent='請填寫標題與網址';return;}
  const obj={id:editingLinkId||'l'+Date.now(),title,cat:document.getElementById('lf-cat').value,brand:document.getElementById('lf-brand').value,desc:document.getElementById('lf-desc').value.trim(),url};
  if(editingLinkId){const idx=LINKS.findIndex(l=>l.id===editingLinkId);if(idx>=0)LINKS[idx]=obj;}else{LINKS.push(obj);}
  saveLinks();cancelLinkEdit();renderLinks();
  document.getElementById('lf-msg').textContent='✓ 已儲存';
  setTimeout(()=>document.getElementById('lf-msg').textContent='',2000);
}
function editLink(id){
  const l=LINKS.find(x=>x.id===id);if(!l)return;
  editingLinkId=id;
  document.getElementById('lf-title').value=l.title;
  document.getElementById('lf-cat').value=l.cat;
  document.getElementById('lf-brand').value=l.brand||'';
  document.getElementById('lf-desc').value=l.desc||'';
  document.getElementById('lf-url').value=l.url;
  document.getElementById('lfTitle').textContent='✏️ 編輯連結';
  document.getElementById('linkForm').scrollIntoView({behavior:'smooth',block:'start'});
}
function cancelLinkEdit(){
  editingLinkId=null;
  ['lf-title','lf-desc','lf-url'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('lf-cat').value='社群';
  document.getElementById('lf-brand').value='';
  document.getElementById('lfTitle').textContent='＋ 新增資料連結';
}
function deleteLink(id){
  if(!confirm('確定要刪除這個連結嗎？'))return;
  LINKS=LINKS.filter(l=>l.id!==id);saveLinks();renderLinks();
}

// ── Tab 切換
function switchTab(id,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tab-sec').forEach(s=>s.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tab-'+id).classList.add('on');
  activeTab=id;
  if(id==='gantt')   renderGantt();
  if(id==='monthly') renderMonthly();
  if(id==='links')   renderLinks();
}

document.getElementById('mSel').addEventListener('change',e=>{mon=e.target.value;render();});
document.getElementById('srch').addEventListener('input',e=>{srch=e.target.value;render();});
document.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); filt=b.dataset.f; render();
}));

// ── 啟動
loadLinks();
loadSheet();
</script>
</body>
</html>
