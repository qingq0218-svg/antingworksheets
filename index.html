
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--g:#1d9e75;--g2:#0f6e56;--bg:#f5f6f8;--card:#fff;--border:#e4e6ea;--t1:#1a1d23;--t2:#5f6470;--t3:#9da4ae;--r:12px;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;}
.hdr{background:var(--card);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:60;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--g);}
.htitle{font-size:14px;font-weight:700;}
.hsub{font-size:11px;color:var(--t3);margin-left:4px;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.hupdate{font-size:11px;color:var(--t3);}
.btn-ref{font-size:11px;padding:4px 11px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;}
.btn-ref:hover{border-color:var(--g);color:var(--g);}
.tab-nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;overflow-x:auto;}
.tab-btn{font-size:12px;font-weight:500;padding:11px 16px;border:none;background:transparent;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;white-space:nowrap;}
.tab-btn:hover{color:var(--t1);}
.tab-btn.on{color:var(--g2);border-bottom-color:var(--g);}
.wrap{max-width:1100px;margin:0 auto;padding:1.25rem 1.5rem;}
.tab-sec{display:none;}.tab-sec.on{display:block;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.1rem;}
.mc{background:var(--card);border-radius:var(--r);padding:.85rem 1rem;box-shadow:var(--sh);border:1px solid var(--border);position:relative;overflow:hidden;}
.mc::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:var(--mc,var(--g));border-radius:4px 0 0 4px;}
.mc-l{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:4px;}
.mc-v{font-size:24px;font-weight:700;color:var(--mc,var(--t1));}
.mc-s{font-size:11px;color:var(--t3);margin-top:2px;}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.1rem;}
.cc{background:var(--card);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:var(--sh);border:1px solid var(--border);}
.cc-t{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:8px;}
.legend{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:7px;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2);}
.legdot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
.toolbar{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap;}
.sec-t{font-size:12px;font-weight:600;color:var(--t1);margin-right:4px;}
.fb{font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s;font-family:inherit;}
.fb:hover{border-color:var(--g);color:var(--g);}
.fb.on{background:var(--g);color:#fff;border-color:transparent;}
.msel,.srch{font-size:11px;padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t1);font-family:inherit;}
.srch{width:150px;margin-left:auto;}
.srch:focus{outline:none;border-color:var(--g);}
.cards{display:flex;flex-direction:column;gap:6px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s;}
.card:hover{border-color:#b8ddd1;}
.card-hd{display:flex;align-items:center;gap:8px;padding:9px 13px;cursor:pointer;user-select:none;}
.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;white-space:nowrap;}
.sa{background:#fef9c3;color:#92700a;}.sd{background:#dbeafe;color:#1d4ed8;}.sp{background:#e5e7eb;color:#374151;}
.btag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg);border:1px solid var(--border);white-space:nowrap;font-weight:600;}
.mtag{font-size:10px;padding:2px 6px;border-radius:4px;background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;white-space:nowrap;font-weight:600;}
.cname{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.clatest{font-size:11px;color:var(--t3);max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prow{display:flex;align-items:center;gap:7px;min-width:110px;}
.pbar-bg{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden;}
.pbar-fg{height:100%;border-radius:3px;transition:width .4s;}
.ptxt{font-size:10px;color:var(--t3);white-space:nowrap;min-width:28px;text-align:right;}
.chev{font-size:13px;color:var(--t3);transition:transform .2s;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}
.card-bd{display:none;border-top:1px solid var(--border);padding:13px 15px;}
.card-bd.open{display:block;}
.bd-prog{margin-bottom:11px;}
.bd-pbar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:4px;}
.bd-pfg{height:100%;border-radius:4px;transition:width .5s;}
.bd-plabel{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);}
.bd-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;}
.blbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;}
.steps{display:flex;flex-direction:column;gap:5px;}
.step{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--t2);cursor:pointer;padding:2px 0;}
.step:hover .sdot:not(.done){border-color:var(--g);}
.sdot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;margin-top:.5px;transition:all .15s;}
.sdot.done{background:var(--g);border-color:var(--g);color:#fff;}
.sdot.curr{background:#fff;border-color:var(--g);color:var(--g);font-size:8px;}
.slbl{line-height:1.4;}.slbl.done{text-decoration:line-through;color:var(--t3);}.slbl.curr{color:var(--g2);font-weight:500;}
.log-list{display:flex;flex-direction:column;gap:4px;}
.log-item{display:flex;align-items:flex-start;gap:6px;font-size:12px;padding:5px 7px;border-radius:8px;transition:background .1s;}
.log-item:hover{background:var(--bg);}
.log-item:hover .log-actions{opacity:1;}
.logdot{width:5px;height:5px;border-radius:50%;background:var(--g);flex-shrink:0;margin-top:5px;}
.logtxt-wrap{flex:1;min-width:0;}
.logtxt{color:var(--t2);line-height:1.5;word-break:break-all;}
.logtxt-edit{width:100%;font-size:12px;padding:4px 7px;border:1px solid var(--g);border-radius:6px;background:var(--card);color:var(--t1);font-family:inherit;resize:none;min-height:36px;}
.log-actions{display:flex;gap:4px;flex-shrink:0;opacity:0;transition:opacity .15s;margin-top:1px;}
.log-btn{font-size:10px;padding:2px 7px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;font-family:inherit;white-space:nowrap;}
.log-btn:hover{border-color:var(--g);color:var(--g);}
.log-btn.danger{border-color:#fca5a5;color:#dc2626;}
.log-btn.danger:hover{background:#fee2e2;}
.log-btn.confirm{border-color:var(--g);background:var(--g);color:#fff;}
.empty-note{font-size:12px;color:var(--t3);font-style:italic;}
.edit-panel{background:var(--bg);border-radius:10px;padding:12px;margin-top:12px;}
.edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.edit-lbl{font-size:11px;color:var(--t3);min-width:60px;}
.edit-sel{font-size:12px;padding:4px 8px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t1);font-family:inherit;}
.edit-pct{display:flex;align-items:center;gap:8px;flex:1;}
.edit-pct input[type=range]{flex:1;}
.edit-pct span{font-size:12px;font-weight:500;min-width:32px;}
.edit-notes{width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--t1);resize:vertical;min-height:52px;font-family:inherit;margin-top:4px;}
.edit-actions{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap;}
.btn-save{font-size:11px;padding:5px 14px;border-radius:8px;border:none;background:var(--g);color:#fff;cursor:pointer;font-family:inherit;}
.btn-del{font-size:11px;padding:5px 14px;border-radius:8px;border:1px solid #fca5a5;background:#fff;color:#dc2626;cursor:pointer;font-family:inherit;}
.msg{font-size:11px;color:var(--g);}
.add-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:var(--sh);}
.add-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.add-field{display:flex;flex-direction:column;gap:4px;}
.add-field label{font-size:11px;color:var(--t3);}
.add-field input,.add-field select{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--t1);font-family:inherit;width:100%;}
.add-textarea{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--t1);font-family:inherit;width:100%;resize:vertical;min-height:60px;}
.btn-add{font-size:12px;padding:6px 16px;border-radius:8px;border:none;background:var(--g);color:#fff;cursor:pointer;font-family:inherit;}
.gantt-wrap{overflow-x:auto;margin-top:4px;}
.gantt-table{border-collapse:collapse;min-width:100%;}
.gantt-table th{font-size:10px;font-weight:600;color:var(--t3);padding:4px 8px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap;}
.gantt-table th.task-col{text-align:left;min-width:180px;}
.gantt-table th.month-col{min-width:52px;}
.gantt-table td{padding:3px 4px;vertical-align:middle;border-bottom:1px solid var(--border);}
.gantt-bar-cell{text-align:center;padding:4px 2px;}
.gantt-bar{height:15px;border-radius:3px;display:inline-block;width:88%;vertical-align:middle;}
.gantt-bar.empty{background:transparent;}
.month-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.mtab{font-size:11px;padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s;}
.mtab:hover{border-color:var(--g);color:var(--g);}
.mtab.on{background:var(--g);color:#fff;border-color:transparent;}
.month-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.1rem;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:3rem;color:var(--t3);font-size:13px;}

/* ── 外部連結頁 ── */
.links-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:1.5rem;}
.link-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1.1rem;box-shadow:var(--sh);display:flex;flex-direction:column;gap:8px;transition:border-color .15s,box-shadow .15s;}
.link-card:hover{border-color:#b8ddd1;box-shadow:0 2px 12px rgba(29,158,117,.1);}
.link-card-top{display:flex;align-items:flex-start;gap:10px;}
.link-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.link-info{flex:1;min-width:0;}
.link-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.link-desc{font-size:11px;color:var(--t3);line-height:1.4;}
.link-url{font-size:10px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--bg);padding:4px 8px;border-radius:6px;font-family:monospace;}
.link-actions{display:flex;gap:6px;align-items:center;}
.btn-link{font-size:11px;padding:5px 12px;border-radius:8px;border:1px solid var(--g);background:var(--g);color:#fff;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.btn-link:hover{background:var(--g2);}
.btn-link-edit{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);cursor:pointer;font-family:inherit;}
.btn-link-edit:hover{border-color:var(--g);color:var(--g);}
.btn-link-del{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid #fca5a5;background:var(--card);color:#dc2626;cursor:pointer;font-family:inherit;}
.btn-link-del:hover{background:#fee2e2;}
/* 新增/編輯連結表單 */
.link-form{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.25rem;margin-bottom:1.5rem;box-shadow:var(--sh);}
.link-form-title{font-size:12px;font-weight:600;margin-bottom:10px;}
.link-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.lf-field{display:flex;flex-direction:column;gap:4px;}
.lf-field label{font-size:11px;color:var(--t3);}
.lf-field input,.lf-field select{font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--t1);font-family:inherit;width:100%;}
.lf-url{grid-column:1/-1;}
.link-form-actions{display:flex;gap:8px;align-items:center;}
/* 類別標籤 */
.cat-tag{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;white-space:nowrap;}
.divider{font-size:11px;font-weight:600;color:var(--t3);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}

@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr);}.charts{grid-template-columns:1fr;}.bd-grid{grid-template-columns:1fr;}.add-grid{grid-template-columns:1fr;}.link-form-grid{grid-template-columns:1fr;}.wrap{padding:1rem;}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-l"><div class="dot"></div><span class="htitle">工作進度 Dashboard</span><span class="hsub">安婷 行銷部 2026</span></div>
  <div class="hdr-r"><span class="hupdate" id="hupdate">—</span><button class="btn-ref" onclick="render()">↻ 重新整理</button></div>
</header>
<nav class="tab-nav">
  <button class="tab-btn on" onclick="switchTab('overview',this)">📊 總覽</button>
  <button class="tab-btn" onclick="switchTab('tasks',this)">📋 案件清單</button>
  <button class="tab-btn" onclick="switchTab('gantt',this)">📅 時間軸</button>
  <button class="tab-btn" onclick="switchTab('monthly',this)">🗓 月份報表</button>
  <button class="tab-btn" onclick="switchTab('links',this)">🔗 資料連結</button>
</nav>
<div class="wrap">
  <div id="main" style="display:none">

    <!-- 總覽 -->
    <div id="tab-overview" class="tab-sec on">
      <div class="metrics" id="mRow"></div>
      <div class="charts">
        <div class="cc"><div class="cc-t">各品牌案件數</div><div style="position:relative;height:200px"><canvas id="cBrand" role="img" aria-label="各品牌案件數">各品牌案件數</canvas></div></div>
        <div class="cc"><div class="cc-t">狀態分布</div><div class="legend" id="donutLeg"></div><div style="position:relative;height:165px"><canvas id="cDonut" role="img" aria-label="狀態分布">狀態分布</canvas></div></div>
        <div class="cc"><div class="cc-t">各月份工作量趨勢</div><div style="position:relative;height:165px"><canvas id="cLine" role="img" aria-label="月份趨勢">月份趨勢</canvas></div></div>
        <div class="cc"><div class="cc-t">進行中 vs 已完成</div><div style="position:relative;height:165px"><canvas id="cStack" role="img" aria-label="進行中與已完成">進行中與已完成</canvas></div></div>
      </div>
    </div>

    <!-- 案件清單 -->
    <div id="tab-tasks" class="tab-sec">
      <div class="add-panel">
        <div style="font-size:12px;font-weight:600;margin-bottom:4px;">＋ 新增案件</div>
        <div class="add-grid">
          <div class="add-field"><label>案件名稱</label><input id="a-name" placeholder="例：易利氣 KOC合作"></div>
          <div class="add-field"><label>品牌</label><select id="a-brand"><option>易利氣</option><option>Wakamoto</option><option>改源</option><option>改源IB</option><option>MUHI</option><option>SLIMWALK</option></select></div>
          <div class="add-field"><label>狀態</label><select id="a-status"><option>進行中</option><option>已完成</option><option>暫停中</option></select></div>
          <div class="add-field"><label>所屬月份</label><select id="a-startm"><option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5" selected>5月</option><option value="6">6月</option></select></div>
        </div>
        <div class="add-field" style="margin-bottom:8px"><label>執行步驟（每行一步）</label><textarea id="a-steps" class="add-textarea" placeholder="步驟一&#10;步驟二&#10;步驟三"></textarea></div>
        <div style="display:flex;align-items:center;gap:10px"><button class="btn-add" onclick="addTask()">新增</button><span class="msg" id="add-msg"></span></div>
      </div>
      <div class="toolbar">
        <span class="sec-t">案件清單</span>
        <button class="fb on" data-f="all">全部</button>
        <button class="fb" data-f="進行中">進行中</button>
        <button class="fb" data-f="已完成">已完成</button>
        <button class="fb" data-f="暫停中">暫停</button>
        <select class="msel" id="mSel"></select>
        <input class="srch" id="srch" type="text" placeholder="搜尋品牌或案件…">
      </div>
      <div class="cards" id="cardList"></div>
    </div>

    <!-- 甘特圖 -->
    <div id="tab-gantt" class="tab-sec">
      <div class="cc">
        <div class="cc-t">任務時間軸（甘特圖）<span style="font-size:10px;font-weight:400;color:var(--t3);margin-left:8px;">— 每格代表一個月</span></div>
        <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;">
          <span class="leg"><span class="legdot" style="background:#EAB308"></span>進行中</span>
          <span class="leg"><span class="legdot" style="background:#3B82F6"></span>已完成</span>
          <span class="leg"><span class="legdot" style="background:#6B7280"></span>暫停</span>
        </div>
        <div class="gantt-wrap" id="ganttWrap"></div>
      </div>
    </div>

    <!-- 月份報表 -->
    <div id="tab-monthly" class="tab-sec">
      <div class="month-tabs" id="monthTabs"></div>
      <div id="monthContent"></div>
    </div>

    <!-- 資料連結 -->
    <div id="tab-links" class="tab-sec">
      <!-- 新增/編輯表單 -->
      <div class="link-form" id="linkForm">
        <div class="link-form-title" id="linkFormTitle">＋ 新增資料連結</div>
        <div class="link-form-grid">
          <div class="lf-field"><label>標題</label><input id="lf-title" placeholder="例：易利氣社群月報"></div>
          <div class="lf-field"><label>類別</label>
            <select id="lf-cat">
              <option value="社群">📱 社群</option>
              <option value="藥廣">📋 藥廣展延</option>
              <option value="市調">📊 市調</option>
              <option value="KOC">🤝 KOC</option>
              <option value="活動">🎉 活動</option>
              <option value="其他">📁 其他</option>
            </select>
          </div>
          <div class="lf-field"><label>品牌（選填）</label>
            <select id="lf-brand">
              <option value="">— 不指定 —</option>
              <option>易利氣</option><option>Wakamoto</option><option>改源</option><option>改源IB</option><option>MUHI</option><option>SLIMWALK</option><option>全品牌</option>
            </select>
          </div>
          <div class="lf-field"><label>備註說明（選填）</label><input id="lf-desc" placeholder="例：1-5月社群貼文排程"></div>

// ── Storage
async function save(){try{await window.storage.set(STORE_KEY,JSON.stringify(TASKS));}catch(e){}}
async function saveLinks(){try{await window.storage.set(LINKS_KEY,JSON.stringify(LINKS));}catch(e){}}
async function loadStored(){
  let ok=false;
  try{const r=await window.storage.get(STORE_KEY);if(r&&r.value){const d=JSON.parse(r.value);if(d&&d.length>0){TASKS=d;ok=true;}}}catch(e){}
  if(!ok)TASKS=JSON.parse(JSON.stringify(RAW));
  try{const r=await window.storage.get(LINKS_KEY);if(r&&r.value){const d=JSON.parse(r.value);if(d&&d.length>0){LINKS=d;return;}}}catch(e){}
  LINKS=JSON.parse(JSON.stringify(RAW_LINKS));
}

function buildMonthSel(){
  const ms=new Set();TASKS.forEach(t=>ms.add(t.startM));
  const sorted=[...ms].sort((a,b)=>a-b);
  document.getElementById('mSel').innerHTML='<option value="all">全部月份</option>'+sorted.map(m=>`<option value="${m}">${ML[m]}</option>`).join('');
}

async function init(){
  await loadStored();
  buildMonthSel();
  document.getElementById('hupdate').textContent='更新：'+new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('loading').style.display='none';
  document.getElementById('main').style.display='block';
  render();
}

function taskInMonth(t,m){
  if(m==='all')return true;const mi=parseInt(m);
  if(t.endM!==null)return t.startM<=mi&&t.endM>=mi;
  return t.startM===mi;
}
function filtered(){
  return TASKS.filter(t=>{
    const mOk=taskInMonth(t,mon);
    const sOk=filt==='all'||(filt==='暫停中'&&['暫停','暫停中','暫緩'].includes(t.status))||t.status===filt;
    const qOk=!srch||(t.brand+t.name).toLowerCase().includes(srch.toLowerCase());
    return mOk&&sOk&&qOk;
  });
}
function render(){
  const list=filtered();renderMetrics(list);renderCharts();
  renderCardList('cardList',list);
  if(activeTab==='gantt')renderGantt();
  if(activeTab==='monthly')renderMonthly();
  if(activeTab==='links')renderLinks();
}
function renderMetrics(list){
  const n=list.length,a=list.filter(t=>t.status==='進行中').length,d=list.filter(t=>t.status==='已完成').length,p=list.filter(t=>['暫停','暫停中','暫緩'].includes(t.status)).length;
  document.getElementById('mRow').innerHTML=`
    <div class="mc" style="--mc:#1a1d23"><div class="mc-l">總案件</div><div class="mc-v">${n}</div><div class="mc-s">目前篩選</div></div>
    <div class="mc" style="--mc:#0f6e56"><div class="mc-l">進行中</div><div class="mc-v">${a}</div><div class="mc-s">${n?Math.round(a/n*100):0}%</div></div>
    <div class="mc" style="--mc:#3b6d11"><div class="mc-l">已完成</div><div class="mc-v">${d}</div><div class="mc-s">${n?Math.round(d/n*100):0}%</div></div>
    <div class="mc" style="--mc:#854f0b"><div class="mc-l">負責品牌</div><div class="mc-v">${new Set(TASKS.map(t=>t.brand)).size}</div><div class="mc-s">個品牌</div></div>`;
}
function renderCharts(){
  const bc2={};TASKS.filter(t=>t.endM===null||t.startM===t.endM).forEach(t=>{bc2[t.brand]=(bc2[t.brand]||0)+1;});
  const sorted=Object.entries(bc2).sort((a,b)=>b[1]-a[1]);
  if(cBrand)cBrand.destroy();
  cBrand=new Chart(document.getElementById('cBrand'),{type:'bar',data:{labels:sorted.map(x=>x[0]),datasets:[{data:sorted.map(x=>x[1]),backgroundColor:sorted.map(x=>bc(x[0])),borderRadius:4,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw+' 件'}}},scales:{x:{ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},y:{ticks:{font:{size:10}}}}}});
  const sc={};TASKS.forEach(t=>{const k=['暫停','暫停中','暫緩'].includes(t.status)?'暫停中':t.status;sc[k]=(sc[k]||0)+1;});
  const se=Object.entries(sc);const scols=se.map(([k])=>PC[k]||'#888');
  if(cDonut)cDonut.destroy();
  cDonut=new Chart(document.getElementById('cDonut'),{type:'doughnut',data:{labels:se.map(x=>x[0]),datasets:[{data:se.map(x=>x[1]),backgroundColor:scols,borderWidth:2,borderColor:'#fff',hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} 件`}}}}});
  document.getElementById('donutLeg').innerHTML=se.map(([k,v],i)=>`<div class="leg"><div class="legdot" style="background:${scols[i]}"></div>${k} <strong>${v}</strong></div>`).join('');
  const months=[1,2,3,4,5];const ml=months.map(m=>ML[m]);
  const bm=months.map(m=>{const mT=TASKS.filter(t=>t.startM===m);const u=new Map();mT.forEach(t=>u.set(t.brand+'|'+t.name,t));const all=[...u.values()];return{total:all.length,active:all.filter(t=>t.status==='進行中').length,done:all.filter(t=>t.status==='已完成').length};});
  if(cLine)cLine.destroy();
  cLine=new Chart(document.getElementById('cLine'),{type:'line',data:{labels:ml,datasets:[{label:'案件數',data:bm.map(m=>m.total),borderColor:'#EAB308',backgroundColor:'rgba(234,179,8,.08)',tension:.35,pointRadius:4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},x:{ticks:{font:{size:10}}}}}});
  if(cStack)cStack.destroy();
  cStack=new Chart(document.getElementById('cStack'),{type:'bar',data:{labels:ml,datasets:[{label:'進行中',data:bm.map(m=>m.active),backgroundColor:'#EAB308',borderRadius:3,stack:'s'},{label:'已完成',data:bm.map(m=>m.done),backgroundColor:'#3B82F6',borderRadius:3,stack:'s'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},scales:{x:{stacked:true,ticks:{font:{size:10}}},y:{stacked:true,beginAtZero:true,ticks:{stepSize:1,font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}}}}});
}

// ── 進度記錄（可編輯刪除）
function logListHTML(gi,logs){
  if(!logs.length)return '<div class="empty-note">尚無記錄</div>';
  return `<div class="log-list">`+logs.map((l,li)=>{
    const key=gi+'_'+li;
    if(editingLog[key]){
      return `<div class="log-item" id="logitem-${key}"><div class="logdot" style="margin-top:8px"></div><div class="logtxt-wrap"><textarea class="logtxt-edit" id="logedit-${key}" rows="2">${l}</textarea><div style="display:flex;gap:5px;margin-top:4px"><button class="log-btn confirm" onclick="confirmEditLog(${gi},${li})">確認</button><button class="log-btn" onclick="cancelEditLog(${gi},${li})">取消</button></div></div></div>`;
    }
    return `<div class="log-item" id="logitem-${key}"><div class="logdot"></div><div class="logtxt-wrap"><div class="logtxt">${l}</div></div><div class="log-actions"><button class="log-btn" onclick="startEditLog(${gi},${li})">編輯</button><button class="log-btn danger" onclick="deleteLog(${gi},${li})">刪除</button></div></div>`;
  }).join('')+'</div>';
}
function startEditLog(gi,li){editingLog[gi+'_'+li]=true;rerenderLogs(gi);}
function cancelEditLog(gi,li){delete editingLog[gi+'_'+li];rerenderLogs(gi);}
async function confirmEditLog(gi,li){const key=gi+'_'+li;const val=document.getElementById('logedit-'+key)?.value.trim();if(val&&TASKS[gi]){TASKS[gi].log[li]=val;if(li===0)TASKS[gi].latest=val;await save();}delete editingLog[key];rerenderLogs(gi);}
async function deleteLog(gi,li){if(!TASKS[gi])return;TASKS[gi].log.splice(li,1);if(li===0)TASKS[gi].latest=TASKS[gi].log[0]||'';await save();rerenderLogs(gi);}
function rerenderLogs(gi){['c','m'].forEach(p=>{const el=document.getElementById('logs-'+p+gi);if(el)el.innerHTML=logListHTML(gi,TASKS[gi]?.log||[]);});}

// ── Card HTML
function cardHTML(t,gi,pfx){
  const col=PC[t.status]||'#888';const id=pfx+gi;
  const isMonthly=t.startM===t.endM;
  const monthTag=isMonthly?`<span class="mtag">${ML[t.startM]}</span>`:'';
  const stepsHtml=t.steps.length?t.steps.map((s,si)=>{const done=si<t.completedSteps,curr=si===t.completedSteps&&t.status==='進行中';return `<div class="step" onclick="toggleStep(${gi},${si})"><div class="sdot ${done?'done':curr?'curr':''}">${done?'✓':curr?'▶':''}</div><span class="slbl ${done?'done':curr?'curr':''}">${s}</span></div>`;}).join(''):'<div class="empty-note">無步驟</div>';
  const spanInfo=t.endM&&t.endM!==t.startM?`${ML[t.startM]}～${ML[t.endM]}`:`${ML[t.startM]}`;
  return `<div class="card"><div class="card-hd" onclick="toggle('${id}')"><span class="pill ${SC[t.status]||'sp'}">${t.status}</span><span class="btag" style="border-color:${bc(t.brand)}44;color:${bc(t.brand)}">${t.brand}</span>${monthTag}<span class="cname">${t.name}</span><span class="clatest">${t.latest||'—'}</span><div class="prow"><div class="pbar-bg"><div class="pbar-fg" id="pfg-${id}" style="width:${t.pct}%;background:${col}"></div></div><span class="ptxt" id="ptxt-${id}">${t.pct}%</span></div><span class="chev" id="chev-${id}">▾</span></div>
    <div class="card-bd" id="bd-${id}"><div class="bd-prog"><div class="bd-pbar"><div class="bd-pfg" id="bdfg-${id}" style="width:${t.pct}%;background:${col}"></div></div><div class="bd-plabel"><span>${t.steps.length?`第 ${Math.min(t.completedSteps,t.steps.length)} / ${t.steps.length} 步 · ${spanInfo}`:'—'}</span><span id="bpct-${id}">${t.pct}% 完成</span></div></div>
    <div class="bd-grid"><div><div class="blbl">執行步驟 <span style="font-size:9px;color:var(--t3);font-weight:400">（點擊勾選）</span></div><div class="steps">${stepsHtml}</div></div><div><div class="blbl" style="display:flex;align-items:center;justify-content:space-between">進度記錄<span style="font-size:9px;color:var(--t3);font-weight:400">滑鼠移入可編輯／刪除</span></div><div id="logs-${id}">${logListHTML(gi,t.log)}</div></div></div>
    <div class="edit-panel"><div class="edit-row"><span class="edit-lbl">狀態</span><select class="edit-sel" onchange="liveStatus(${gi},this.value)"><option ${t.status==='進行中'?'selected':''}>進行中</option><option ${t.status==='已完成'?'selected':''}>已完成</option><option ${['暫停中','暫停'].includes(t.status)?'selected':''}>暫停中</option></select></div><div class="edit-row"><span class="edit-lbl">進度 %</span><div class="edit-pct"><input type="range" min="0" max="100" value="${t.pct}" oninput="livePct(${gi},'${id}',this.value)"><span id="epct-${id}">${t.pct}%</span></div></div><div style="margin-bottom:4px;font-size:11px;color:var(--t3);">新增進度記錄</div><textarea class="edit-notes" id="enotes-${id}" placeholder="輸入最新進度說明…"></textarea><div class="edit-actions"><button class="btn-save" onclick="saveCard(${gi},'${id}')">儲存更新</button><button class="btn-del" onclick="deleteTask(${gi})">刪除案件</button><span class="msg" id="emsg-${id}"></span></div></div></div></div>`;
}
function renderCardList(elId,list){const el=document.getElementById(elId);if(!list.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--t3);font-size:13px;">無符合條件的案件</div>';return;}el.innerHTML=list.map(t=>cardHTML(t,TASKS.indexOf(t),'c')).join('');}
function toggle(id){document.getElementById('bd-'+id).classList.toggle('open');document.getElementById('chev-'+id).classList.toggle('open');}
async function toggleStep(gi,si){const t=TASKS[gi];if(!t)return;if(si<t.completedSteps)t.completedSteps=si;else t.completedSteps=si+1;t.pct=t.steps.length?Math.round(t.completedSteps/t.steps.length*100):t.pct;if(t.completedSteps>=t.steps.length){t.status='已完成';t.pct=100;}else if(t.status==='已完成')t.status='進行中';await save();render();}
function livePct(gi,id,val){if(TASKS[gi])TASKS[gi].pct=Number(val);document.getElementById('epct-'+id).textContent=Math.round(val)+'%';const col=PC[TASKS[gi]?.status]||'#888';['pfg-','bdfg-'].forEach(p=>{const el=document.getElementById(p+id);if(el){el.style.width=val+'%';el.style.background=col;}});if(document.getElementById('ptxt-'+id))document.getElementById('ptxt-'+id).textContent=Math.round(val)+'%';if(document.getElementById('bpct-'+id))document.getElementById('bpct-'+id).textContent=Math.round(val)+'% 完成';}
function liveStatus(gi,val){if(TASKS[gi])TASKS[gi].status=val;}
async function saveCard(gi,id){const t=TASKS[gi];if(!t)return;const notes=document.getElementById('enotes-'+id)?.value.trim();if(notes){const d=new Date().toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});t.log.unshift(d+' '+notes);t.latest=t.log[0];document.getElementById('enotes-'+id).value='';}await save();const msg=document.getElementById('emsg-'+id);if(msg){msg.textContent='✓ 已儲存';setTimeout(()=>msg.textContent='',2000);}render();}
async function deleteTask(gi){if(!confirm('確定要刪除這個案件嗎？'))return;TASKS.splice(gi,1);await save();buildMonthSel();render();}
async function addTask(){const name=document.getElementById('a-name').value.trim();const brand=document.getElementById('a-brand').value;const status=document.getElementById('a-status').value;const startM=parseInt(document.getElementById('a-startm').value);const steps=(document.getElementById('a-steps').value.trim()||'').split('\n').map(s=>s.trim()).filter(Boolean);if(!name){document.getElementById('add-msg').textContent='請填寫案件名稱';return;}TASKS.push({brand,name,status,startM,endM:null,steps,completedSteps:0,pct:0,log:[],latest:''});await save();buildMonthSel();render();document.getElementById('a-name').value='';document.getElementById('a-steps').value='';document.getElementById('add-msg').textContent='✓ 已新增';setTimeout(()=>document.getElementById('add-msg').textContent='',2000);}

// ── 甘特圖
function renderGantt(){const months=[1,2,3,4,5,6];const ganttTasks=TASKS.filter(t=>t.endM===null||t.endM!==t.startM);const seen=new Set();const recurring=[];TASKS.filter(t=>t.startM===t.endM).forEach(t=>{const key=t.brand+'|'+t.name;if(!seen.has(key)){seen.add(key);recurring.push({...t,startM:1,endM:5});}});const all=[...recurring,...ganttTasks];let html=`<table class="gantt-table"><thead><tr><th class="task-col">品牌 / 案件</th>${months.map(m=>`<th class="month-col">${ML[m]}</th>`).join('')}</tr></thead><tbody>`;all.forEach(t=>{const col=PC[t.status]||'#888';html+=`<tr><td><div style="font-size:12px;font-weight:500">${t.name}</div><div style="font-size:10px;color:var(--t3)">${t.brand}</div></td>${months.map(m=>{const inR=t.startM<=m&&(t.endM==null||t.endM>=m);return `<td class="gantt-bar-cell">${inR?`<div class="gantt-bar" style="background:${col};opacity:.8"></div>`:'<div class="gantt-bar empty"></div>'}</td>`;}).join('')}</tr>`;});document.getElementById('ganttWrap').innerHTML=html+'</tbody></table>';}

// ── 月份報表
function renderMonthly(){const months=[1,2,3,4,5];document.getElementById('monthTabs').innerHTML=months.map(m=>`<button class="mtab ${m===curMonthTab?'on':''}" onclick="selectMonth(${m})">${ML[m]}</button>`).join('');const monthTasks=TASKS.filter(t=>{if(t.endM===null)return t.startM===curMonthTab||t.startM<curMonthTab;if(t.startM===t.endM)return t.startM===curMonthTab;return t.startM<=curMonthTab&&t.endM>=curMonthTab;});const u=new Map();monthTasks.forEach(t=>u.set(t.brand+'|'+t.name+'|'+t.startM,t));const list=[...u.values()];const active=list.filter(t=>t.status==='進行中').length,done=list.filter(t=>t.status==='已完成').length,paused=list.filter(t=>['暫停','暫停中','暫緩'].includes(t.status)).length;const cardsHtml=list.length?list.map(t=>cardHTML(t,TASKS.indexOf(t),'m')).join(''):'<div style="text-align:center;padding:1.5rem;color:var(--t3);font-size:13px;">本月無案件</div>';document.getElementById('monthContent').innerHTML=`<div class="month-stats"><div class="mc" style="--mc:#0f6e56"><div class="mc-l">${ML[curMonthTab]}執行中案件</div><div class="mc-v">${list.length}</div><div class="mc-s">含跨月</div></div><div class="mc" style="--mc:#1d9e75"><div class="mc-l">本月新開案</div><div class="mc-v">${TASKS.filter(t=>t.startM===curMonthTab&&(t.endM===null||t.endM===curMonthTab)).length}</div><div class="mc-s">件</div></div><div class="mc" style="--mc:#854f0b"><div class="mc-l">進行中 / 完成</div><div class="mc-v">${active} / ${done}</div><div class="mc-s">暫停 ${paused} 件</div></div></div><div class="cc"><div class="cc-t">${ML[curMonthTab]} — 執行中案件（含跨月）</div><div class="cards" style="margin-top:8px">${cardsHtml}</div></div>`;}
function selectMonth(m){curMonthTab=m;renderMonthly();}

// ══════════════════════════════════
// ── 資料連結頁
// ══════════════════════════════════
function renderLinks(){
  const el=document.getElementById('linksContent');
  if(!LINKS.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--t3);font-size:13px;">尚無連結，請在上方新增</div>';return;}
  // 依類別分組
  const groups={};
  LINKS.forEach(l=>{if(!groups[l.cat])groups[l.cat]=[];groups[l.cat].push(l);});
  let html='';
  const catOrder=['社群','藥廣','市調','KOC','活動','其他'];
  catOrder.forEach(cat=>{
    if(!groups[cat])return;
    const st=CAT_STYLE[cat]||{icon:'📁',bg:'#f8fafc',color:'#475569'};
    html+=`<div class="divider">${st.icon} ${cat}</div><div class="links-grid">`;
    groups[cat].forEach(l=>{
      const shortUrl=l.url.replace(/^https?:\/\//,'').replace(/\/edit.*/,'').substring(0,40)+'…';
      html+=`<div class="link-card">
        <div class="link-card-top">
          <div class="link-icon" style="background:${st.bg}">${st.icon}</div>
          <div class="link-info">
            <div class="link-title">${l.title}</div>
            <div class="link-desc">${l.brand?`<span style="color:${bc(l.brand)};font-weight:600">${l.brand}</span> · `:''} ${l.desc||''}</div>
          </div>
        </div>
        <div class="link-url" title="${l.url}">${shortUrl}</div>
        <div class="link-actions">
          <a class="btn-link" href="${l.url}" target="_blank" rel="noopener">開啟 ↗</a>
          <button class="btn-link-edit" onclick="editLink('${l.id}')">編輯</button>
          <button class="btn-link-del" onclick="deleteLink('${l.id}')">刪除</button>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

// ── 新增連結
async function saveLink(){
  const title=document.getElementById('lf-title').value.trim();
  const url=document.getElementById('lf-url').value.trim();
  if(!title||!url){document.getElementById('lf-msg').textContent='請填寫標題與網址';return;}
  const obj={id:editingLinkId||'l'+Date.now(),title,cat:document.getElementById('lf-cat').value,brand:document.getElementById('lf-brand').value,desc:document.getElementById('lf-desc').value.trim(),url};
  if(editingLinkId){const idx=LINKS.findIndex(l=>l.id===editingLinkId);if(idx>=0)LINKS[idx]=obj;}
  else{LINKS.push(obj);}
  await saveLinks();
  cancelLinkEdit();
  renderLinks();
  document.getElementById('lf-msg').textContent='✓ 已儲存';setTimeout(()=>document.getElementById('lf-msg').textContent='',2000);
}

function editLink(id){
  const l=LINKS.find(x=>x.id===id);if(!l)return;
  editingLinkId=id;
  document.getElementById('lf-title').value=l.title;
  document.getElementById('lf-cat').value=l.cat;
  document.getElementById('lf-brand').value=l.brand||'';
  document.getElementById('lf-desc').value=l.desc||'';
  document.getElementById('lf-url').value=l.url;
  document.getElementById('linkFormTitle').textContent='✏️ 編輯連結';
  document.getElementById('linkForm').scrollIntoView({behavior:'smooth',block:'start'});
}

function cancelLinkEdit(){
  editingLinkId=null;
  ['lf-title','lf-desc','lf-url'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('lf-cat').value='社群';
  document.getElementById('lf-brand').value='';
  document.getElementById('linkFormTitle').textContent='＋ 新增資料連結';
}

async function deleteLink(id){
  if(!confirm('確定要刪除這個連結嗎？'))return;
  LINKS=LINKS.filter(l=>l.id!==id);
  await saveLinks();renderLinks();
}

// ── Tab 切換
function switchTab(id,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tab-sec').forEach(s=>s.classList.remove('on'));
  btn.classList.add('on');document.getElementById('tab-'+id).classList.add('on');
  activeTab=id;
  if(id==='gantt')renderGantt();
  if(id==='monthly')renderMonthly();
  if(id==='links')renderLinks();
}

document.getElementById('mSel').addEventListener('change',e=>{mon=e.target.value;render();});
document.getElementById('srch').addEventListener('input',e=>{srch=e.target.value;render();});
document.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');filt=b.dataset.f;render();}));
init();
</script>
